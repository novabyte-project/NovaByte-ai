<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Novabyte AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Novabyte AI Notes & Questions Generator</h1>

  <label>Category:</label>
  <select id="categorySelect">
    <option value="junior">Junior</option>
    <option value="focus">Focus</option>
    <option value="exam">Exam</option>
    <option value="college">College</option>
  </select>

  <label>Class:</label>
  <select id="classSelect"></select>

  <label>Paste your notes/topic here:</label>
  <textarea id="studentNotes" rows="10"></textarea>

  <button id="btnSimplify">Simplify Notes</button>
  <button id="btnQuestions">Generate Questions</button>
  <button id="btnCopy">Copy Result</button>

  <div id="resultBox"></div>

  <script src="chat.js"></script>
</body>
</html>
